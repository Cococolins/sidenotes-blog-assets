<script type="module">
import PhotoSwipeLightbox from 'https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe-lightbox.esm.min.js';
    // headroom.js 没有官方 ESM 包，用 jsDelivr 的 /+esm 端点让 Rollup 即时转换 UMD → ESM
    import Headroom from 'https://cdn.jsdelivr.net/npm/headroom.js@0.12.0/+esm';

const SITE_CONFIG = {
    "tagline": " / 记录即反抗。",
    "exactTimeSelectors": [
        ".notes ul li",
        ".gallery ul li"
    ]
};

    // 【V17】空闲时预加载 PhotoSwipe 核心模块，消除首次点击的网络延迟
    const pswpModuleUrl = 'https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe.esm.min.js';
    if ('requestIdleCallback' in window) {
        requestIdleCallback(() => import(pswpModuleUrl));
    } else {
        setTimeout(() => import(pswpModuleUrl), 1500);
    }

    const BlogApp = {
        // ════════════════════════════════════════════════════════════════
        //  0. 启动母线 (主信号链)
        // ════════════════════════════════════════════════════════════════
        init() {
        this.initSubtitle();
    this.initNavigation();
    this.initAutoHideHeader();
    this.initFigcaption();
    this.initGallery();
    this.initExactTime();
    this.initPostExcerpts();
    this.initYouTube();
    this.initExternalLinks();
    },

    // ════════════════════════════════════════════════════════════════
    //  1. 副标题注入 (真正解决了重影问题的 SEO 解析)
    // ════════════════════════════════════════════════════════════════
    initSubtitle() {
        const h1 = document.querySelector('header .title h1');
    if (!h1 || h1.querySelector('.site-tagline')) return;

    const subtitle = document.createElement('span');
    subtitle.className = 'site-tagline';
    subtitle.textContent = SITE_CONFIG.tagline;
    h1.appendChild(subtitle);
    },

    // ════════════════════════════════════════════════════════════════
    //  2. 响应式导航栏
    // ════════════════════════════════════════════════════════════════
    initNavigation() {
        const nav = document.querySelector('nav');
    const header = document.querySelector('header');
    if (!nav || !header) return;

    const navLinks = Array.from(nav.querySelectorAll('p a'));
    if (navLinks.length === 0) return;

    const hamburger = document.createElement('button');
    hamburger.className = 'nav-hamburger';
    hamburger.setAttribute('aria-label', '展开菜单');
    hamburger.setAttribute('aria-expanded', 'false');
    hamburger.textContent = '☰';
    nav.appendChild(hamburger);

    const mobileMenu = document.createElement('div');
    mobileMenu.className = 'nav-mobile-menu';
        navLinks.forEach(a => {
            const link = document.createElement('a');
    link.href = a.href;
    link.textContent = a.textContent;
    if (a.title) link.title = a.title;
    if (a.rel) link.rel = a.rel;
    mobileMenu.appendChild(link);
        });
    document.body.appendChild(mobileMenu);

    function positionMenu() {
            const rect = header.getBoundingClientRect();
    // 它是 fixed 定位，直接使用视口相对的 rect.bottom 即可。原先加 scrollY 会导致滚屏时菜单飞出屏幕外。
    mobileMenu.style.top   = rect.bottom + 'px';
    mobileMenu.style.left  = rect.left   + 'px';
    mobileMenu.style.width = rect.width  + 'px';
        }

        // 监听滚动和缩放，确保打开状态下的菜单紧跟随 sticky 的 header 浮动
        window.addEventListener('scroll', () => {
            if (mobileMenu.classList.contains('open')) {
        // 使用 requestAnimationFrame 优化性能
        window.requestAnimationFrame(positionMenu);
            }
        });
        window.addEventListener('resize', () => {
            if (mobileMenu.classList.contains('open')) {
        window.requestAnimationFrame(positionMenu);
            }
        });

        hamburger.addEventListener('click', (e) => {
        e.stopPropagation();
    const isOpen = mobileMenu.classList.toggle('open');
    hamburger.textContent = isOpen ? '✕' : '☰';
    hamburger.setAttribute('aria-expanded', isOpen);
    if (isOpen) positionMenu();
        });
        
        document.addEventListener('click', () => {
        mobileMenu.classList.remove('open');
    hamburger.textContent = '☰';
    hamburger.setAttribute('aria-expanded', 'false');
        });
    },

    // ════════════════════════════════════════════════════════════════
    //  3. 滚动隐藏顶部导航栏 (基于 Headroom.js)
    //     向下滚动 → header 上滑隐藏；向上滚动 → header 滑回。
    //     底层逻辑由 Headroom.js 处理（CSS 类切换），动画交给 CSS transition。
    // ════════════════════════════════════════════════════════════════
    initAutoHideHeader() {
        const header = document.querySelector('header');
        if (!header) return;

        const headroom = new Headroom(header, {
            // 顶部安全区：滚动距离小于 80px 时 header 永远显示
            // 与 CSS 中 scroll-padding-top: 80px 保持一致，确保锚点跳转不被 header 遮挡
            offset: 80,
            // 容差：向上滚动需 5px 才显示（过滤手指自然抖动），向下立即隐藏（手感更利落）
            tolerance: { up: 5, down: 0 },
            // header 隐藏前的钩子：同步关闭可能正打开的移动端菜单
            // 否则菜单会跟随 header 一起滑出屏幕外（mobile menu 用 getBoundingClientRect 定位）
            onUnpin() {
                const menu = document.querySelector('.nav-mobile-menu');
                if (!menu || !menu.classList.contains('open')) return;
                menu.classList.remove('open');
                const hamburger = document.querySelector('.nav-hamburger');
                if (hamburger) {
                    hamburger.textContent = '☰';
                    hamburger.setAttribute('aria-expanded', 'false');
                }
            }
        });
        headroom.init();
    },

    // ════════════════════════════════════════════════════════════════
    //  4. 图注生成与语义化包裹 (Figcaption & Figure)
    //     从 Markdown title 属性提取图注，统一包裹 <figure> 结构。
    //     必须在 initGallery() 之前执行，确保 PhotoSwipe 处理时结构已就位。
    // ════════════════════════════════════════════════════════════════
    initFigcaption() {
        // 第一步：从 img[title] 提取图注，生成 <figcaption> 插到所在 <p> 后面
        const processed = new Set();
        document.querySelectorAll('main img[title]').forEach(img => {
            const p = img.closest('p');
            if (!p || processed.has(p)) {
                img.removeAttribute('title');
                return;
            }
            processed.add(p);

            const caption = document.createElement('figcaption');
            caption.textContent = img.title;
            p.after(caption);
            img.removeAttribute('title');
        });

        // 第二步：统一 <figure> 包裹（覆盖 title 生成与手写 HTML 两种来源）
        document.querySelectorAll('main > figcaption').forEach(caption => {
            const prev = caption.previousElementSibling;
            if (!prev || prev.tagName !== 'P' || !prev.querySelector('img')) return;

            const figure = document.createElement('figure');
            prev.parentNode.insertBefore(figure, prev);
            figure.appendChild(prev);
            figure.appendChild(caption);
        });
    },

    // ════════════════════════════════════════════════════════════════
    //  5. 工业级图片画廊 (基于 PhotoSwipe v5)
    // ════════════════════════════════════════════════════════════════
    initGallery() {
        // 过滤掉被 CSS 隐藏的图片
        const images = Array.from(document.querySelectorAll('main img:not([style*="display:none"])'));
    if (images.length === 0) return;

        images.forEach(img => {
            if (img.parentElement.tagName === 'A' && img.parentElement.classList.contains('pswp-gallery__item')) return;

    const link = document.createElement('a');
    link.href = img.src;
    link.className = 'pswp-gallery__item';
    link.target = '_blank';
    link.setAttribute('data-cropped', 'true');
    link.setAttribute('data-pswp-width', img.naturalWidth || 1600);
    link.setAttribute('data-pswp-height', img.naturalHeight || 1200);

    if (!img.complete) {
        img.onload = () => {
            link.setAttribute('data-pswp-width', img.naturalWidth);
            link.setAttribute('data-pswp-height', img.naturalHeight);
        };
    }

    img.parentNode.insertBefore(link, img);
    link.appendChild(img);
        });

    const groups = new Map();
        document.querySelectorAll('main .pswp-gallery__item').forEach(item => {
            // 利用 closest 向上查找到单篇 Post 的容器。解决跨 p 标签无法连贯滑动的问题。
            const container = item.closest('.notes ul > li, .gallery ul > li, main');
    if (container) {
                if (!groups.has(container)) groups.set(container, []);
    groups.get(container).push(item);
            }
        });

        groups.forEach((items, container) => {
        container.classList.add('pswp-gallery');
        });

    const lightbox = new PhotoSwipeLightbox({
        gallery: '.pswp-gallery',
    children: '.pswp-gallery__item',
            pswpModule: () => import(pswpModuleUrl),
    bgOpacity: 0.95,
    spacing: 0.1,
    showHideOpacity: true,       // 【V17】zoom 动画叠加 opacity 淡入，柔化裁切缩略图的宽高比跳变
    maxWidthToAnimate: 10000,    // 【V17】默认 4000 导致 7008px 巨图动画被禁用，提升阈值修复
    padding: {top: 20, bottom: 20, left: 0, right: 0 },
    errorMsg: '图片加载失败'
        });

    lightbox.on('uiRegister', function() {
        lightbox.pswp.ui.registerElement({
            name: 'custom-caption',
            order: 9,
            isButton: false,
            appendTo: 'wrapper',
            html: '',
            onInit: (el, pswp) => {
                lightbox.pswp.on('change', () => {
                    const currSlideElement = lightbox.pswp.currSlide.data.element;
                    let captionHTML = '';
                    if (currSlideElement) {
                        const container = currSlideElement.parentElement;
                        const nextEl = container.nextElementSibling;
                        if (nextEl && nextEl.tagName === 'FIGCAPTION') {
                            captionHTML = nextEl.innerHTML;
                        } else {
                            const img = currSlideElement.querySelector('img');
                            if (img && img.alt) {
                                captionHTML = img.alt;
                            }
                        }
                    }
                    el.innerHTML = captionHTML || '';
                });
            }
        });
        });

        // 【V16.1 修复】动态提取点击一刻的大图真实尺寸，专门对付 10MB 级别缓存巨图在解析极微小时差内导致的 1600 占位符死锁！
        lightbox.on('itemData', (e) => {
            const { itemData } = e;
            if (itemData.element) {
                const img = itemData.element.querySelector('img');
                if (img && img.naturalWidth) {
                    itemData.width = img.naturalWidth;
                    itemData.height = img.naturalHeight;
                }
            }
        });

    lightbox.init();


    },

    // ════════════════════════════════════════════════════════════════
    //  6. 动态提取并注入具体时间 (取代 CSS 强行定时动画)
    // ════════════════════════════════════════════════════════════════
    initExactTime() {
        const timeNodes = document.querySelectorAll('time');
        
        timeNodes.forEach(timeNode => {
        // 所有 time 元素在匹配的最新的 CSS 中被设置为 opacity: 0。在这里由 JS 判定执行就绪后一并赋予 loaded 显现
        timeNode.classList.add('loaded');

    const datetimeStr = timeNode.getAttribute('datetime');
    if (!datetimeStr) return;

    const dateObj = new Date(datetimeStr);
    // 增加 aria 属性为盲人阅读器提供格式化语音支持
    const options = {year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false };
    timeNode.setAttribute('aria-label', `发布时间：${dateObj.toLocaleString('zh-CN', options)}`);

    // 如果不是站点配置的信息流列表中的 time，就不需要做附加的精准时间提取
    if (!SITE_CONFIG.exactTimeSelectors.some(selector => timeNode.closest(selector))) return;

    const hours = dateObj.getHours().toString().padStart(2, '0');
    const minutes = dateObj.getMinutes().toString().padStart(2, '0');

    const timeSpan = document.createElement('span');
    timeSpan.className = 'exact-time';
    timeSpan.textContent = `${hours}:${minutes}`;
    timeSpan.setAttribute('aria-hidden', 'true');

    const dateContainer = timeNode.closest('span');
    if (dateContainer) {
        dateContainer.appendChild(timeSpan);
            }
        });
    },

    // ════════════════════════════════════════════════════════════════
    //  7. Daily 首页摘要水合
    //     Bear 的 embedded list 只读 meta_description；这里用单篇正文里的
    //     <!-- more --> 标记生成更像传统博客的首页摘要。
    // ════════════════════════════════════════════════════════════════
    initPostExcerpts() {
        const config = SITE_CONFIG.excerptHydrator;
        if (!config?.enabled) return;

        const list = document.querySelector(config.listSelector);
        if (!list) return;

        this.initPostExcerptLinks(list);

        const titleLinks = Array.from(list.querySelectorAll(':scope > li > a[href]'));
        const posts = titleLinks
            .slice(0, config.maxPosts || titleLinks.length)
            .map(link => ({ link, item: link.closest('li') }))
            .filter(post => post.item && (config.overrideExistingDescription || !post.item.querySelector(':scope > p')));

        if (posts.length === 0) return;

        posts.forEach(post => {
            this.hydratePostExcerpt(post, config);
        });
    },

    initPostExcerptLinks(list) {
        list.addEventListener('click', event => {
            if (event.target.closest('a')) return;

            const excerpt = event.target.closest('li > p');
            if (!excerpt || !list.contains(excerpt)) return;

            const item = excerpt.closest('li');
            const link = item?.querySelector(':scope > span + a[href]');
            if (!link) return;

            window.location.href = link.href;
        });
    },

    async hydratePostExcerpt({ link, item }, config) {
        try {
            const response = await fetch(link.href, { credentials: 'same-origin' });
            if (!response.ok) return;

            const html = await response.text();
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const excerpt = this.extractPostExcerpt(doc, config);
            if (!excerpt.paragraphs.length) return;

            const excerptLink = document.createElement('a');
            excerptLink.className = 'post-excerpt-link';
            excerptLink.href = link.href;
            excerpt.paragraphs.forEach((paragraph, index) => {
                const cloned = paragraph.cloneNode(true);
                cloned.classList.add('post-excerpt');
                cloned.querySelectorAll('a').forEach(nestedLink => {
                    nestedLink.replaceWith(nestedLink.textContent);
                });
                if (excerpt.truncated && index === excerpt.paragraphs.length - 1) {
                    this.appendEllipsis(cloned);
                }
                excerptLink.appendChild(cloned);
            });

            if (config.overrideExistingDescription) {
                item.querySelectorAll(':scope > p').forEach(p => p.remove());
            }

            const media = item.querySelector(':scope > img, :scope > a.pswp-gallery__item');
            if (media) {
                item.insertBefore(excerptLink, media);
            } else {
                item.appendChild(excerptLink);
            }
        } catch { }
    },

    extractPostExcerpt(doc, config) {
        const main = doc.querySelector('main');
        if (!main) return { paragraphs: [], truncated: false };

        const marker = (config.marker || 'more').trim().toLowerCase();
        const fallbackParagraphs = Math.max(1, config.fallbackParagraphs || 2);
        const hasMarker = Array.from(main.childNodes)
            .some(node => node.nodeType === Node.COMMENT_NODE && node.nodeValue.trim().toLowerCase() === marker);
        const paragraphs = [];
        let reachedContent = false;
        let hitMarker = false;
        let hasMoreContent = false;

        for (const node of main.childNodes) {
            if (node.nodeType === Node.COMMENT_NODE && node.nodeValue.trim().toLowerCase() === marker) {
                hitMarker = true;
                break;
            }

            if (node.nodeType !== Node.ELEMENT_NODE) continue;

            if (!reachedContent) {
                if (node.tagName === 'H1') {
                    reachedContent = true;
                }
                continue;
            }

            if (node.tagName !== 'P') {
                if (paragraphs.length > 0) hasMoreContent = true;
                continue;
            }

            if (node.querySelector('time, img, iframe, video, audio')) continue;
            if (!node.textContent.trim()) continue;

            paragraphs.push(node);
            if (!hasMarker && paragraphs.length >= fallbackParagraphs) {
                hasMoreContent = this.hasReadableContentAfter(node, marker);
                break;
            }
        }

        return {
            paragraphs,
            truncated: hitMarker || hasMoreContent
        };
    },

    hasReadableContentAfter(node, marker) {
        let current = node.nextSibling;
        while (current) {
            if (current.nodeType === Node.COMMENT_NODE && current.nodeValue.trim().toLowerCase() === marker) {
                return true;
            }
            if (current.nodeType === Node.ELEMENT_NODE && current.textContent.trim()) {
                return true;
            }
            current = current.nextSibling;
        }
        return false;
    },

    appendEllipsis(paragraph) {
        const text = paragraph.textContent.trim();
        if (text.endsWith('…') || text.endsWith('...')) return;
        paragraph.append('…');
    },

    // ════════════════════════════════════════════════════════════════
    //  8. YouTube 解析与装载底包
    // ════════════════════════════════════════════════════════════════
    async loadYouTube({el, videoId, isBare, customText, placeholder}) {
        let captionText = customText;
    if (isBare) {
            try {
                // 这里的网络请求被挪动到了进入视带时才会发配，省下了巨大的初始流量
                const resp = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
    if (resp.ok) {
                    const data = await resp.json();
    captionText = data.title;
                }
            } catch { }
    captionText = captionText || '在 YouTube 上观看';
        }

    const iframe = document.createElement('iframe');
    iframe.src = `https://www.youtube.com/embed/${videoId}`;
    iframe.loading = 'lazy';
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    iframe.allowFullscreen = true;
        // 兜底 UI
        iframe.onerror = () => {
            if (placeholder) placeholder.textContent = '视频加载失败，请点击下方链接观看';
        };

    const caption = document.createElement('figcaption');
    const captionLink = document.createElement('a');
    captionLink.href = `https://www.youtube.com/watch?v=${videoId}`;
    captionLink.target = '_blank';
    captionLink.rel = 'noopener noreferrer';
    captionLink.textContent = captionText;
    caption.appendChild(captionLink);

    const figure = document.createElement('figure');
    figure.appendChild(iframe);
    figure.appendChild(caption);

    if (placeholder) {
        placeholder.replaceWith(figure);
        } else {
        el.replaceWith(figure);
        }
    },

    // ════════════════════════════════════════════════════════════════
    //  9. YouTube 懒加载调度器 (基于 IntersectionObserver)
    // ════════════════════════════════════════════════════════════════
    initYouTube() {
        // 使用更健壮的正则包裹，避免参数被抛弃导致匹配不到空白纯净文本
        const ytRegex = /(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]+)(?:\S*)?/;
    const targets = [];

        // 提取带文字标签的 a 链接
        document.querySelectorAll('main a[href]').forEach(a => {
            if (!ytRegex.test(a.href)) return;
    const parent = a.parentElement;
    if (!parent || parent.tagName !== 'P') return;
    if (parent.textContent.trim() !== a.textContent.trim()) return;

    const match = a.href.match(ytRegex);
    const text = a.textContent.trim();
    const isBare = text === a.href ||
    text === a.href.replace(/^https?:\/\//, '') ||
    /(?:youtube\.com|youtu\.be)/.test(text);

    targets.push({el: parent, videoId: match[1], isBare, customText: isBare ? null : text });
        });

        // 提取直接贴 URL 的纯文本段落
        document.querySelectorAll('main p').forEach(p => {
            if (targets.some(t => t.el === p)) return;
            if (p.children.length > 0) return;

    const text = p.textContent.trim();
    const match = text.match(ytRegex);
    if (!match) return;

    // 安全过滤周围的多余字符
    const cleanText = text.replace(match[0], '').replace(/^https?:\/\/(www\.)?/, '').replace(/[?&].*$/, '');
            if (cleanText.length > 5) return;

    targets.push({el: p, videoId: match[1], isBare: true, customText: null });
        });

    if (targets.length === 0) return;

        const createPlaceholder = (el) => {
            const placeholder = document.createElement('div');
    placeholder.className = 'yt-placeholder';
    placeholder.textContent = '加载视频中...';
    el.replaceWith(placeholder);
    return placeholder;
        };

    if ('IntersectionObserver' in window) {
            const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const targetData = targets.find(t => t.el === entry.target);
                if (targetData) {
                    const placeholder = createPlaceholder(targetData.el);
                    this.loadYouTube({ ...targetData, placeholder });
                }
                obs.unobserve(entry.target);
            }
        });
            }, {rootMargin: '300px 0px' });

            targets.forEach(t => observer.observe(t.el));
        } else {
        targets.forEach(t => {
            const placeholder = createPlaceholder(t.el);
            this.loadYouTube({ ...t, placeholder });
        });
        }
    },

    // ════════════════════════════════════════════════════════════════
    //  10. 外部链接新窗口打开 (全局)
    // ════════════════════════════════════════════════════════════════
    initExternalLinks() {
    // 定义你真正的根域名
    const myBaseDomain = 'sidenotes.cc';

    document.querySelectorAll('main a[href]').forEach(a => {
        if (a.classList.contains('pswp-gallery__item')) return;
        try {
            const url = new URL(a.href, location.origin);
            const linkHost = url.hostname;

            // 判断是否为「自己人」的三个条件：
            // 1. 链接域名等于当前所在的域名（兜底平台分配的子域名）
            // 2. 链接域名等于你的主站 sidenotes.cc
            // 3. 链接域名是你的子站（以 .sidenotes.cc 结尾）
            const isInternal = 
                linkHost === location.hostname || 
                linkHost === myBaseDomain || 
                linkHost.endsWith('.' + myBaseDomain);

            if (!isInternal) {
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
            }
        } catch { }
    });
	}
};

// ════════════════════════════════════════════════════════════════

/*
 Plugin name: Editor shortcut
 Description: Easily open the post or homepage editor using Ctrl + E
 Author: Herman Martinus
 Author URI: https://herman.bearblog.dev
*/

(function() {
    'use strict';

    window.addEventListener('keydown', function(e) {
        // Trigger on Ctrl + E
        if (e.ctrlKey && e.code === 'KeyE') {
            e.preventDefault();

            // 1. Get the "name" from the tag with the specific content key
            const nameTag = document.querySelector('meta[content="look-for-the-bear-necessities"]');
            const name = nameTag ? nameTag.getAttribute('name') : null;

            // 2. Get the "token" from your new meta tag
            const tokenTag = document.querySelector('meta[name="token"]');
            const token = tokenTag ? tokenTag.getAttribute('content') : null;

            // 3. Build URL and Redirect

            let finalUrl = `https://bearblog.dev/${name}/dashboard/`
            if (name && token) {
                finalUrl = `https://bearblog.dev/${name}/dashboard/posts/${token}/`
                window.open(finalUrl, '_blank');
            } else {
                window.open(finalUrl, '_blank');
            }
        }
    });
})();
</script>
